<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efetuar Login</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <!--introduçã-->
    <section>
        <header>
            <h1>Bem - vindo ao meu site!</h1>
            <p>Para acessar o portal, por favor <strong>efetue o login.</strong></p>
        </header>
    </section>
    <!--Sistema-Login-->
    <section>
        <main>
            <h2>Página de Login:</h2>
            <p>Seu nome: <input type="text"></p>
            <p>Email: <input type="email" placeholder="seu_email@gmail.com">  </p>
            <p><abbr title="Crie uma senha forte, com números e símbolos. Exemplo: S3nh4@123">Senha:</abbr><input type="password"></p>
            <p><i>Esqueci a Senha</i></p>
            <p>Não tem uma conta? <strong>Crie uma aqui!</strong></p>
            <button>continuar</button><br>
        </main>
    </section>
    <!--Rodapé-->
    <section>
        <footer><br>
            <p>Saiba Mais</p>
            <p>Contato</p>
        </footer>
    </section>
</body>
</html>
